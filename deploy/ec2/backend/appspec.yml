version: 0.0
os: linux

files:
  - source: artifact
    destination: /opt/coditude/backend/current

file_exists_behavior: OVERWRITE

permissions:
  - object: /opt/coditude/backend
    owner: coditude
    group: coditude
    mode: "0755"
    type:
      - directory
  - object: /opt/coditude/backend/current
    owner: coditude
    group: coditude
    mode: "0755"
    type:
      - directory

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 120
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/start.sh
      timeout: 120
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      timeout: 180
      runas: root
