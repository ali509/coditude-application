version: 0.0
os: linux

files:
  - source: artifact
    destination: /opt/coditude/frontend/current

file_exists_behavior: OVERWRITE

hooks:
  BeforeInstall:
    - location: scripts/deploy.sh
      timeout: 120
      runas: root
  ApplicationStart:
    - location: scripts/deploy.sh
      timeout: 120
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      timeout: 120
      runas: root
