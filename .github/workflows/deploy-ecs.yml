name: Deploy ECS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment and AWS deployment stage
        required: true
        default: dev
        type: choice
        options:
          - dev
      deploy_services:
        description: Update existing ECS services after publishing images
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-ecs-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, publish, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: ${{ inputs.environment }}

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      PROJECT_NAME: coditude
      ENVIRONMENT: ${{ inputs.environment }}

    steps:
      - name: Check out application
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: github-ecs-${{ github.run_id }}

      - name: Read infrastructure outputs
        shell: bash
        run: |
          set -euo pipefail

          output() {
            aws cloudformation describe-stacks \
              --stack-name "$1" \
              --query "Stacks[0].Outputs[?OutputKey=='$2'].OutputValue | [0]" \
              --output text
          }

          foundation_stack="${PROJECT_NAME}-${ENVIRONMENT}-container-foundation"

          {
            echo "CLUSTER_NAME=$(output "$foundation_stack" ClusterName)"
            echo "FRONTEND_REPOSITORY=$(output "$foundation_stack" FrontendRepositoryUri)"
            echo "BACKEND_REPOSITORY=$(output "$foundation_stack" BackendRepositoryUri)"
            echo "FRONTEND_SERVICE=${PROJECT_NAME}-${ENVIRONMENT}-frontend"
            echo "BACKEND_SERVICE=${PROJECT_NAME}-${ENVIRONMENT}-backend"
          } >> "$GITHUB_ENV"

      - name: Sign in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          platforms: linux/amd64
          push: true
          tags: ${{ env.BACKEND_REPOSITORY }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          platforms: linux/amd64
          push: true
          tags: ${{ env.FRONTEND_REPOSITORY }}:${{ github.sha }}

      - name: Update backend service
        if: ${{ inputs.deploy_services }}
        shell: bash
        run: |
          set -euo pipefail

          current_task_definition=$(aws ecs describe-services \
            --cluster "$CLUSTER_NAME" \
            --services "$BACKEND_SERVICE" \
            --query "services[0].taskDefinition" \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$current_task_definition" \
            --query taskDefinition \
            --output json |
            jq --arg image "${BACKEND_REPOSITORY}:${GITHUB_SHA}" '
              del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
              | .containerDefinitions |= map(
                  if .name == "backend" then .image = $image else . end
                )
            ' > backend-task-definition.json

          new_task_definition=$(aws ecs register-task-definition \
            --cli-input-json file://backend-task-definition.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          aws ecs update-service \
            --cluster "$CLUSTER_NAME" \
            --service "$BACKEND_SERVICE" \
            --task-definition "$new_task_definition" \
            --output json > /dev/null

      - name: Update frontend service
        if: ${{ inputs.deploy_services }}
        shell: bash
        run: |
          set -euo pipefail

          current_task_definition=$(aws ecs describe-services \
            --cluster "$CLUSTER_NAME" \
            --services "$FRONTEND_SERVICE" \
            --query "services[0].taskDefinition" \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$current_task_definition" \
            --query taskDefinition \
            --output json |
            jq --arg image "${FRONTEND_REPOSITORY}:${GITHUB_SHA}" '
              del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
              | .containerDefinitions |= map(
                  if .name == "frontend" then .image = $image else . end
                )
            ' > frontend-task-definition.json

          new_task_definition=$(aws ecs register-task-definition \
            --cli-input-json file://frontend-task-definition.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          aws ecs update-service \
            --cluster "$CLUSTER_NAME" \
            --service "$FRONTEND_SERVICE" \
            --task-definition "$new_task_definition" \
            --output json > /dev/null

      - name: Wait for ECS services
        if: ${{ inputs.deploy_services }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$BACKEND_SERVICE" "$FRONTEND_SERVICE"

      - name: Deployment summary
        run: |
          echo "Published image tag: ${GITHUB_SHA}"
          echo "Backend image: ${BACKEND_REPOSITORY}:${GITHUB_SHA}"
          echo "Frontend image: ${FRONTEND_REPOSITORY}:${GITHUB_SHA}"
          echo "Updated ECS services: ${{ inputs.deploy_services }}"
