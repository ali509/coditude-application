name: Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/backend/requirements.txt
            apps/backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: apps/backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            -r requirements.txt \
            -r requirements-dev.txt

      - name: Run tests
        working-directory: apps/backend
        run: python -m pytest -v

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Run lint
        working-directory: apps/frontend
        run: npm run lint

      - name: Build production application
        working-directory: apps/frontend
        run: npm run build

  containers:
    name: Container builds
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Docker Compose
        run: docker compose --env-file .env.example config --quiet

      - name: Build backend image
        run: docker build --tag coditude-backend:validation apps/backend

      - name: Build frontend image
        run: docker build --tag coditude-frontend:validation apps/frontend

  codedeploy:
    name: CodeDeploy bundles
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Build deployment bundles
        run: make codedeploy-bundles

      - name: Inspect bundle contents
        run: |
          unzip -l build/codedeploy/coditude-frontend.zip
          unzip -l build/codedeploy/coditude-backend.zip
